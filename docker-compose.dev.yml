name: mediflow-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=mediflow
      - POSTGRES_USER=mediflow
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+psycopg2://mediflow:${POSTGRES_PASSWORD}@postgres:5432/mediflow
      - SECRET_KEY=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEYS}
      - GROQ_API_KEY=${GROQ_API_KEYS}
      - TOGETHER_API_KEY=${TOGETHER_API_KEYS}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+psycopg2://mediflow:${POSTGRES_PASSWORD}@postgres:5432/mediflow
    ports:
      - "8001:8001"
    depends_on:
      - postgres

  frontend_admin:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILD_MODE: admin
        VITE_PATIENT_PORTAL_URL: http://127.0.0.1:5174/patient
    ports:
      - "5173:80"
    depends_on:
      - backend

  frontend_patient:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILD_MODE: patient
        VITE_ADMIN_PORTAL_URL: http://127.0.0.1:5173/login
    ports:
      - "5174:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro

  grafana:
    image: grafana/grafana:11.1.5
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data:
