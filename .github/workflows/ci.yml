name: CI

on:
  push:
    branches: [main, develop, staging, agents]
  pull_request:
    branches: [main, develop, staging]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<70" wheel
          pip install torch==2.3.1 --index-url https://download.pytorch.org/whl/cpu
          pip install numpy tqdm more-itertools tiktoken numba
          pip install --no-build-isolation openai-whisper==20240930
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run backend tests
        env:
          ML_SERVICE_URL: http://localhost:8001
        run: python -m pytest -v backend/tests
