name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  backend-tests:
    name: Backend Tests (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<70" wheel
          pip install torch==2.3.1 --index-url https://download.pytorch.org/whl/cpu
          pip install numpy tqdm more-itertools tiktoken numba
          pip install --no-build-isolation openai-whisper==20240930
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Basic FastAPI import check
        env:
          PYTHONPATH: .
        run: python -c "from main import app; print('FastAPI app loaded successfully!')"

      - name: Run backend tests
        env:
          PYTHONPATH: .
          ML_SERVICE_URL: http://localhost:8001
        run: python -m pytest -v tests

  frontend-tests:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --if-present

      - name: Build frontend (Admin)
        run: npm run build:admin

      - name: Build frontend (Patient)
        run: npm run build:patient