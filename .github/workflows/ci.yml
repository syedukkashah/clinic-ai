name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  backend-tests:
    name: Backend Tests (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<70" wheel
          pip install torch==2.3.1 --index-url https://download.pytorch.org/whl/cpu
          pip install numpy tqdm more-itertools tiktoken numba
          pip install --no-build-isolation openai-whisper==20240930
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Basic FastAPI import check
        env:
          PYTHONPATH: .
        run: python -c "from main import app; print('FastAPI app loaded successfully!')"

      - name: Run backend tests
        env:
          PYTHONPATH: .
          ML_SERVICE_URL: http://localhost:8001
        run: python -m pytest -v tests --ignore=tests/test_redis_memory.py

  frontend-tests:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --if-present

      - name: Build frontend (Admin)
        run: npm run build:admin

      - name: Build frontend (Patient)
        run: npm run build:patient

  scheduling-agent-tests:
    name: Scheduling Agent Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<70" wheel
          pip install torch==2.3.1 --index-url https://download.pytorch.org/whl/cpu
          pip install numpy tqdm more-itertools tiktoken numba
          pip install --no-build-isolation openai-whisper==20240930
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run scheduling agent tests
        env:
          PYTHONPATH: .
          ML_SERVICE_URL: http://localhost:8001
        run: python -m pytest -v tests/test_scheduling_agent.py

  redis-memory-tests:
    name: Redis Memory Tests (Real Redis)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Wait for Redis
        run: |
          python -c "
          import socket, time
          for i in range(30):
              try:
                  s = socket.create_connection(('localhost', 6379), timeout=1)
                  s.close()
                  print('Redis is up!')
                  break
              except OSError:
                  print(f'Waiting for Redis... ({i+1}/30)')
                  time.sleep(1)
          "

      - name: Run Redis memory tests
        env:
          PYTHONPATH: .
        run: pytest -v tests/test_redis_memory.py

  llm-router-tests:
    name: LLM Router Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<70" wheel
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run LLM Router tests
        env:
          PYTHONPATH: .
          # Use mock keys for testing the router logic without real API calls
          GROQ_API_KEYS: test-groq-key-1,test-groq-key-2
          GEMINI_API_KEYS: test-gemini-key-1,test-gemini-key-2
          MISTRAL_API_KEYS: test-mistral-key-1,test-mistral-key-2
        run: python -m pytest -v tests/test_llm_router.py